<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chat Room Debug (WS)</title>
  <style>
    body { font-family: system-ui, Arial, sans-serif; margin: 24px; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    input, textarea { padding: 8px 10px; }
    input { min-width: 240px; }
    textarea { width: min(760px, 95vw); height: 70px; resize: vertical; }
    button { padding: 10px 14px; cursor: pointer; }
    .muted { color: #666; font-size: 12px; }

    #log {
      margin-top: 14px;
      width: min(900px, 95vw);
      height: 360px;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 10px;
      overflow: auto;
      background: #fafafa;
      white-space: pre-wrap;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 13px;
    }

    .pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      background: #eee;
      font-size: 12px;
      margin-left: 6px;
    }

    code { background: #f5f5f5; padding: 1px 6px; border-radius: 6px; }
  </style>
</head>
<body>
  <h1>Room chat debug via WebSocket</h1>

  <div class="row">
    <input id="email" type="email" placeholder="email" value="user@example.com" />
    <input id="password" type="password" placeholder="password" value="1234" />
    <button id="btnLogin">Login</button>
    <button id="btnWs">Apri WS</button>
    <button id="btnClose" disabled>Chiudi WS</button>
    <span id="status" class="pill">DISCONNECTED</span>
  </div>

  <div class="muted" style="margin-top:10px;">
    API: <code id="apiInfo"></code> — WS: <code id="wsInfo"></code>
  </div>

  <hr style="margin: 14px 0;">

  <div class="row">
    <input id="roomId" placeholder="roomId (es. lavagna-1)" value="lavagna-1" />
    <button id="btnJoin" disabled>Join room</button>
    <button id="btnLeave" disabled>Leave room</button>
    <span class="pill">room: <span id="roomStatus">none</span></span>
  </div>

  <div class="row" style="margin-top: 10px;">
    <textarea id="message" placeholder="Scrivi un messaggio...">Ciao room!</textarea>
  </div>

  <div class="row" style="margin-top: 10px;">
    <button id="btnSend" disabled>Invia in room</button>
    <button id="btnPing" disabled>Ping</button>
    <span class="muted">
      Invia: <code>{"type":"room:message","roomId":"...","payload":{"text":"..."}}</code>
    </span>
  </div>

  <div id="log" aria-label="log messaggi"></div>

  <script>
    // ===== CONFIG (same-origin safe) =====
    const API_BASE = window.location.origin;
    const LOGIN_URL = API_BASE + "/api/v1/users/login";
    const WS_URL =
      (window.location.protocol === "https:" ? "wss://" : "ws://") +
      window.location.host +
      "/ws";

    document.getElementById("apiInfo").textContent = LOGIN_URL;
    document.getElementById("wsInfo").textContent = WS_URL;

    // ===== UI helpers =====
    const logEl = document.getElementById("log");
    const statusEl = document.getElementById("status");
    const roomStatusEl = document.getElementById("roomStatus");

    let currentRoom = null;
    let ws = null;

    function ts(d = new Date()) {
      const pad = (n) => String(n).padStart(2, "0");
      return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    }

    function line(s) {
      logEl.textContent += s + "\n";
      logEl.scrollTop = logEl.scrollHeight;
      console.log(s);
    }

    function setStatus(s) {
      statusEl.textContent = s;
    }

    function setRoom(r) {
      currentRoom = r;
      roomStatusEl.textContent = r || "none";
    }

    function canSend() {
      const ok = ws && ws.readyState === WebSocket.OPEN && !!currentRoom;
      document.getElementById("btnSend").disabled = !ok;
    }

    // ===== LOGIN =====
    document.getElementById("btnLogin").addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      line(`[${ts()}] → LOGIN ${email}`);

      try {
        const r = await fetch(LOGIN_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "include",
          body: JSON.stringify({ email, password }),
        });

        const text = await r.text();
        let data;
        try { data = JSON.parse(text); } catch { data = text; }

        line(`[${ts()}] ← LOGIN status=${r.status} ${typeof data === "string" ? data : JSON.stringify(data)}`);
        if (!r.ok) line(`[${ts()}] ❌ Login fallito`);
        else line(`[${ts()}] ✅ Login ok (cookie HttpOnly impostato)`);
      } catch (err) {
        line(`[${ts()}] ❌ Errore login: ${String(err)}`);
      }
    });

    // ===== OPEN WS =====
    document.getElementById("btnWs").addEventListener("click", () => {
      if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) {
        line(`[${ts()}] WS già aperta/connecting`);
        return;
      }

      line(`[${ts()}] → Opening WS ${WS_URL}`);
      ws = new WebSocket(WS_URL);

      ws.onopen = () => {
        setStatus("CONNECTED");
        line(`[${ts()}] ✅ WS open`);
        document.getElementById("btnClose").disabled = false;
        document.getElementById("btnJoin").disabled = false;
        document.getElementById("btnLeave").disabled = false;
        document.getElementById("btnPing").disabled = false;
        canSend();
      };

      ws.onmessage = (e) => {
        let msg;
        try { msg = JSON.parse(e.data); } catch {
          line(`[${ts()}] ← WS (raw) ${e.data}`);
          return;
        }

        if (msg.type === "ws:connected") {
          line(`[${ts()}] ← ws:connected userId=${msg.userId}`);
          return;
        }

        if (msg.type === "room:joined") {
          line(`[${ts()}] ← joined room=${msg.roomId}`);
          setRoom(msg.roomId);
          canSend();
          return;
        }

        if (msg.type === "room:left") {
          line(`[${ts()}] ← left room=${msg.roomId}`);
          if (currentRoom === msg.roomId) setRoom(null);
          canSend();
          return;
        }

        if (msg.type === "room:message") {
          const when = msg.ts ? ts(new Date(msg.ts)) : ts();
          const room = msg.roomId || "?";
          const from = msg.fromUserId ?? "?";
          const text = msg.payload?.text ?? JSON.stringify(msg.payload ?? "");
          line(`[${when}] [${room}] ${from}: ${text}`);
          return;
        }

        if (msg.type === "pong") {
          line(`[${ts()}] ← pong`);
          return;
        }

        if (msg.type === "error") {
          line(`[${ts()}] ❌ error ${msg.error} ${msg.roomId ? "(room " + msg.roomId + ")" : ""}`);
          return;
        }

        line(`[${ts()}] ← WS ${JSON.stringify(msg)}`);
      };

      ws.onclose = (e) => {
        setStatus("DISCONNECTED");
        line(`[${ts()}] ✋ WS close code=${e.code} reason=${e.reason || "(none)"}`);
        document.getElementById("btnClose").disabled = true;
        document.getElementById("btnJoin").disabled = true;
        document.getElementById("btnLeave").disabled = true;
        document.getElementById("btnPing").disabled = true;
        document.getElementById("btnSend").disabled = true;
        setRoom(null);
      };

      ws.onerror = () => {
        line(`[${ts()}] ❌ WS error (vedi console)`);
      };
    });

    document.getElementById("btnClose").addEventListener("click", () => {
      if (!ws) return;
      line(`[${ts()}] → Closing WS`);
      ws.close(1000, "client close");
    });

    // ===== JOIN / LEAVE =====
    document.getElementById("btnJoin").addEventListener("click", () => {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;

      const roomId = document.getElementById("roomId").value.trim();
      if (!roomId) {
        line(`[${ts()}] ❌ roomId vuoto`);
        return;
      }

      ws.send(JSON.stringify({ type: "room:join", roomId }));
      line(`[${ts()}] → room:join ${roomId}`);
    });

    document.getElementById("btnLeave").addEventListener("click", () => {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      const roomId = currentRoom || document.getElementById("roomId").value.trim();
      if (!roomId) return;

      ws.send(JSON.stringify({ type: "room:leave", roomId }));
      line(`[${ts()}] → room:leave ${roomId}`);
    });

    // ===== SEND ROOM MESSAGE =====
    document.getElementById("btnSend").addEventListener("click", () => {
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        line(`[${ts()}] WS non è aperta`);
        return;
      }
      if (!currentRoom) {
        line(`[${ts()}] ❌ Non sei in nessuna room (fai join)`);
        return;
      }

      const text = document.getElementById("message").value;
      if (!text || !text.trim()) {
        line(`[${ts()}] ❌ Messaggio vuoto`);
        return;
      }

      ws.send(JSON.stringify({
        type: "room:message",
        roomId: currentRoom,
        payload: { text }
      }));

      // echo locale
      line(`[${ts()}] [${currentRoom}] (me): ${text}`);
      document.getElementById("message").value = "";
    });

    document.getElementById("btnPing").addEventListener("click", () => {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      ws.send("ping");
      line(`[${ts()}] → ping`);
    });

    // Ctrl+Enter per invio
    document.getElementById("message").addEventListener("keydown", (e) => {
      if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) {
        document.getElementById("btnSend").click();
      }
    });
  </script>
</body>
</html>
