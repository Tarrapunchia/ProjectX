<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WS Test</title>
  <style>
    body { font-family: system-ui, Arial, sans-serif; margin: 24px; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    input { padding: 8px 10px; min-width: 240px; }
    button { padding: 10px 14px; cursor: pointer; }
    #log { margin-top: 16px; padding: 12px; border: 1px solid #ddd; border-radius: 8px; height: 260px; overflow: auto; white-space: pre-wrap; }
    .muted { color: #666; font-size: 12px; }
  </style>
</head>
<body>
  <h1>Login + WebSocket test</h1>

  <div class="row">
    <input id="email" type="email" placeholder="email" value="test@test.com" />
    <input id="password" type="password" placeholder="password" value="1234" />
  </div>

  <div class="row" style="margin-top: 12px;">
    <button id="btnLogin">Login (POST /api/v1/users/login)</button>
    <button id="btnWs">Apri WS (GET /ws upgrade)</button>
    <button id="btnPing" disabled>Invia "ping"</button>
    <textarea id="message">Testo Messaggio</textarea>
    <button id="btnMsg" disabled>Invia "messaggio"</button>
    <button id="btnClose" disabled>Chiudi WS</button>
  </div>

  <div class="muted" style="margin-top: 10px;">
    Backend: <code id="apiBase"></code> — WS: <code id="wsUrl"></code>
  </div>

  <div id="log"></div>

  <script>
    // ==== CONFIG ====
    // Se servi questa pagina da Fastify su 127.0.0.1:5000, lasciali così.
    const API_BASE = "http://127.0.0.1:5000";
    const LOGIN_URL = API_BASE + "/api/v1/users/login";

    // ws:// in dev. Se sei su https, usa wss://
    const WS_URL = "ws://127.0.0.1:5000/ws";

    document.getElementById("apiBase").textContent = API_BASE;
    document.getElementById("wsUrl").textContent = WS_URL;

    // ==== UI helpers ====
    const logEl = document.getElementById("log");
    function log(...args) {
      const line = args.map(a => typeof a === "string" ? a : JSON.stringify(a, null, 2)).join(" ");
      logEl.textContent += line + "\n";
      logEl.scrollTop = logEl.scrollHeight;
      console.log(...args);
    }

    let ws = null;

    // ==== LOGIN ====
    document.getElementById("btnLogin").addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      log("→ LOGIN request:", { email, password: password ? "***" : "" });

      try {
        const r = await fetch(LOGIN_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          // fondamentale per ricevere/salvare cookie HttpOnly "session"
          credentials: "include",
          body: JSON.stringify({ email, password }),
        });

        const text = await r.text();
        let data;
        try { data = JSON.parse(text); } catch { data = text; }

        log("← LOGIN response:", "status=" + r.status, data);

        if (!r.ok) {
          log("Login fallito: controlla credenziali o backend.");
          return;
        }

        log("✅ Cookie di sessione (HttpOnly) dovrebbe essere stato impostato. Ora puoi aprire la WS.");
      } catch (err) {
        log("❌ Errore login:", String(err));
      }
    });

    // ==== OPEN WS ====
    document.getElementById("btnWs").addEventListener("click", () => {
      if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) {
        log("WS già aperta o in connessione.");
        return;
      }

      log("→ Opening WS:", WS_URL);
      ws = new WebSocket(WS_URL);

      ws.onopen = () => {
        log("✅ WS open");
        document.getElementById("btnPing").disabled = false;
        document.getElementById("btnMsg").disabled = false;
        document.getElementById("btnClose").disabled = false;
      };

      ws.onmessage = (e) => {
        log("← WS message:", e.data);
      };

      ws.onclose = (e) => {
        log("✋ WS close:", "code=" + e.code, "reason=" + (e.reason || "(none)"));
        document.getElementById("btnPing").disabled = true;
        document.getElementById("btnMsg").disabled = true;
        document.getElementById("btnClose").disabled = true;
      };

      ws.onerror = (e) => {
        log("❌ WS error (vedi console per dettagli):", e.type);
      };
    });

    // ==== PING / CLOSE ====
    document.getElementById("btnPing").addEventListener("click", () => {
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        log("WS non è aperta.");
        return;
      }
      log("→ WS send: ping");
      ws.send("ping");
    });

    // Messaggio
    document.getElementById("btnMsg").addEventListener("click", () => {
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        log("WS non è aperta.");
        return;
      }
      const msg = document.getElementById("message").value;
      log(`→ WS send: ${msg}`);
      ws.send(msg);
    });

    document.getElementById("btnClose").addEventListener("click", () => {
      if (!ws) return;
      log("→ Closing WS...");
      ws.close(1000, "client close");
    });
  </script>
</body>
</html>
