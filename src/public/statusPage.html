<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FT_TRANSCENDENCE - Service Status</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --muted: #94a3b8;
      --text: #e5e7eb;
      --ok: #22c55e;
      --warn: #f59e0b;
      --bad: #ef4444;
      --border: #1f2937;
      --accent: #38bdf8;
    }

    * {
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      margin: 0;
      background: linear-gradient(160deg, #020617, #0f172a);
      color: var(--text);
      min-height: 100vh;
      padding: 32px;
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 2rem;
    }

    p.subtitle {
      margin: 0 0 24px;
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .card {
      background: rgba(17, 24, 39, 0.9);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }

    .card h2 {
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 1.1rem;
      color: var(--accent);
    }

    .status-line {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      font-size: 1rem;
      font-weight: bold;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      display: inline-block;
    }

    .dot.ok { background: var(--ok); }
    .dot.warn { background: var(--warn); }
    .dot.bad { background: var(--bad); }

    .kv {
      margin: 8px 0;
      color: var(--muted);
      line-height: 1.5;
      word-break: break-word;
    }

    .kv strong {
      color: var(--text);
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 16px;
      cursor: pointer;
      font-weight: bold;
      background: var(--accent);
      color: #082f49;
    }

    button:hover {
      filter: brightness(1.08);
    }

    pre {
      margin: 0;
      padding: 16px;
      overflow: auto;
      background: #020617;
      border: 1px solid var(--border);
      border-radius: 12px;
      color: #cbd5e1;
      white-space: pre-wrap;
    }

    .footer {
      margin-top: 20px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .small {
      font-size: 0.95rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>FT_TRANSCENDENCE Backend Status</h1>
    <p class="subtitle">
      DevOps status page for health, readiness, runtime information, and recovery visibility.
    </p>

    <div class="actions">
      <button onclick="refreshAll()">Refresh status</button>
    </div>

    <div class="grid">
      <div class="card">
        <h2>/health</h2>
        <div id="health-state" class="status-line">
          <span class="dot warn"></span>
          <span>Loading...</span>
        </div>
        <div id="health-details" class="kv small"></div>
      </div>

      <div class="card">
        <h2>/ready</h2>
        <div id="ready-state" class="status-line">
          <span class="dot warn"></span>
          <span>Loading...</span>
        </div>
        <div id="ready-details" class="kv small"></div>
      </div>

      <div class="card">
        <h2>/status</h2>
        <div id="status-state" class="status-line">
          <span class="dot warn"></span>
          <span>Loading...</span>
        </div>
        <div id="status-details" class="kv small"></div>
      </div>
    </div>

    <div class="card">
      <h2>Raw JSON</h2>
      <pre id="raw-json">Loading...</pre>
    </div>


  </div>

  <script>
    function dotClass(ok, degraded = false) {
      if (ok) return 'dot ok';
      if (degraded) return 'dot warn';
      return 'dot bad';
    }

    function setState(containerId, detailsId, ok, text, details, degraded = false) {
      const container = document.getElementById(containerId);
      const detailsNode = document.getElementById(detailsId);

      container.innerHTML = `
        <span class="${dotClass(ok, degraded)}"></span>
        <span>${text}</span>
      `;
      detailsNode.innerHTML = details;
    }

    async function loadEndpoint(path) {
      const res = await fetch(path, { credentials: 'include' });
      let data = null;

      try {
        data = await res.json();
      } catch (_e) {
        data = { error: 'Invalid JSON response' };
      }

      return { ok: res.ok, status: res.status, data };
    }

    async function refreshAll() {
      const raw = {};

      try {
        const health = await loadEndpoint('/health');
        raw.health = health;

        setState(
          'health-state',
          'health-details',
          health.ok,
          health.ok ? 'Healthy' : 'Unhealthy',
          `
            <div class="kv"><strong>HTTP:</strong> ${health.status}</div>
            <div class="kv"><strong>Service:</strong> ${health.data.service ?? 'unknown'}</div>
            <div class="kv"><strong>Uptime:</strong> ${typeof health.data.uptime === 'number' ? health.data.uptime.toFixed(2) + 's' : 'n/a'}</div>
            <div class="kv"><strong>Timestamp:</strong> ${health.data.timestamp ?? 'n/a'}</div>
          `
        );

        const ready = await loadEndpoint('/ready');
        raw.ready = ready;

        setState(
          'ready-state',
          'ready-details',
          ready.ok,
          ready.ok ? 'Ready' : 'Not ready',
          `
            <div class="kv"><strong>HTTP:</strong> ${ready.status}</div>
            <div class="kv"><strong>Database:</strong> ${ready.data.database ?? 'unknown'}</div>
            <div class="kv"><strong>Status:</strong> ${ready.data.status ?? 'unknown'}</div>
            <div class="kv"><strong>Timestamp:</strong> ${ready.data.timestamp ?? 'n/a'}</div>
          `
        );

        const status = await loadEndpoint('/status');
        raw.status = status;

        const degraded = !status.ok && status.data?.status === 'degraded';

        setState(
          'status-state',
          'status-details',
          status.ok,
          status.ok ? 'Operational' : (degraded ? 'Degraded' : 'Unavailable'),
          `
            <div class="kv"><strong>HTTP:</strong> ${status.status}</div>
            <div class="kv"><strong>Environment:</strong> ${status.data.environment ?? 'unknown'}</div>
            <div class="kv"><strong>Uptime:</strong> ${typeof status.data.uptime === 'number' ? status.data.uptime.toFixed(2) + 's' : 'n/a'}</div>
            <div class="kv"><strong>Database provider:</strong> ${status.data.database?.provider ?? 'unknown'}</div>
            <div class="kv"><strong>Database status:</strong> ${status.data.database?.status ?? 'unknown'}</div>
            <div class="kv"><strong>Timestamp:</strong> ${status.data.timestamp ?? 'n/a'}</div>
          `,
          degraded
        );

        document.getElementById('raw-json').textContent = JSON.stringify(raw, null, 2);
      } catch (err) {
        const msg = err instanceof Error ? err.message : String(err);

        setState('health-state', 'health-details', false, 'Error', `<div class="kv"><strong>Message:</strong> ${msg}</div>`);
        setState('ready-state', 'ready-details', false, 'Error', `<div class="kv"><strong>Message:</strong> ${msg}</div>`);
        setState('status-state', 'status-details', false, 'Error', `<div class="kv"><strong>Message:</strong> ${msg}</div>`);

        document.getElementById('raw-json').textContent = JSON.stringify({ error: msg }, null, 2);
      }
    }

    refreshAll();
    setInterval(refreshAll, 15000);
  </script>
</body>
</html>
